<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>短影片爆款生成器</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;--surface:#fff;--surface2:#f3f2ef;
  --border:#e5e4e0;--border-strong:#ccc;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --success:#065f46;--success-bg:#ecfdf5;--success-border:#a7f3d0;
  --warn:#92400e;--warn-bg:#fef9ee;--warn-border:#fcd34d;
  --radius:8px;--card-radius:12px;
  --ig:#7b2d8b;--ig-bg:#f5e4f7;--ig-bd:#c77dce;
  --fb:#1a4f9e;--fb-bg:#e4ecf7;--fb-bd:#5b8dd9;
  --tk:#111;--tk-bg:#f0f0f0;--tk-bd:#999;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#26262a;--surface2:#2e2e32;
    --border:#3a3a3e;--border-strong:#555;
    --text:#f0eeea;--text2:#b4b2a9;--text3:#666;
    --accent-bg:#1e3a5f;--accent-border:#2563eb;
    --success-bg:#022c22;--success-border:#065f46;
    --warn-bg:#3d2a00;--warn-border:#92400e;
    --ig-bg:#2d1533;--fb-bg:#0f2040;--tk-bg:#1a1a1a;--tk-bd:#555;
    --ig:#d499e0;--fb:#7aaef5;--tk:#ddd
  }
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.875rem 1.5rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.hd-left{display:flex;align-items:center;gap:.5rem}
header h1{font-size:17px;font-weight:700}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;border:1px solid}
.badge-pwa{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
main{max-width:740px;margin:0 auto;padding:1.25rem 1rem 4rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.125rem;margin-bottom:.875rem}
.stitle{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.875rem;display:flex;align-items:center;gap:5px}
/* platform tabs */
.ptabs{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:.875rem}
.ptab{padding:9px 6px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;font-size:12.5px;font-weight:600;color:var(--text2);background:var(--surface2);transition:all .14s;user-select:none;line-height:1.4}
.ptab:hover{border-color:var(--border-strong)}
.ptab span.ico{font-size:19px;display:block;margin-bottom:2px}
.ptab.active[data-p=ig]{background:var(--ig-bg);border-color:var(--ig-bd);color:var(--ig)}
.ptab.active[data-p=fb]{background:var(--fb-bg);border-color:var(--fb-bd);color:var(--fb)}
.ptab.active[data-p=tk]{background:var(--tk-bg);border-color:var(--tk-bd);color:var(--tk)}
/* algo info bar */
.algo-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.625rem .875rem;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:.875rem;display:none}
.algo-bar.visible{display:block}
.algo-bar strong{color:var(--text);font-size:11px;display:block;margin-bottom:3px}
/* goal grid */
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.gbtn{padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:12.5px;color:var(--text2);background:var(--surface2);text-align:left;display:flex;align-items:center;gap:9px;transition:all .14s;user-select:none}
.gbtn:hover{border-color:var(--border-strong)}
.gbtn.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.gbtn .gi{font-size:19px;flex-shrink:0}
.gbtn .gn{font-weight:700;font-size:12.5px}
.gbtn .gd{font-size:10.5px;color:var(--text3);margin-top:1px}
.gbtn.active .gd{color:var(--accent);opacity:.75}
/* form */
.fg{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.875rem}
.fg:last-child{margin-bottom:0}
.fg label{font-size:12.5px;font-weight:600;color:var(--text2)}
.fg label .req{color:#dc2626;margin-left:2px}
input[type=text],input[type=password],textarea,select{
  width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);
  font-size:13.5px;background:var(--surface);color:var(--text);font-family:inherit;
  transition:border-color .14s,box-shadow .14s
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:76px;line-height:1.6}
/* tone */
.tone-row{display:flex;flex-wrap:wrap;gap:5px}
.tpill{padding:4px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text2);background:var(--surface2);user-select:none;transition:all .14s}
.tpill:hover{border-color:var(--border-strong)}
.tpill.active{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:600}
/* api */
.api-row{display:grid;grid-template-columns:1fr 155px;gap:7px;align-items:end}
@media(max-width:420px){.api-row{grid-template-columns:1fr}}
.api-note{font-size:11.5px;color:var(--text3);margin-top:5px}
/* generate button */
.gen-btn{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .14s;margin-top:.875rem;letter-spacing:.01em}
.gen-btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* progress */
.prog-area{display:none;margin-top:.875rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.125rem}
.prog-area.show{display:block}
.prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:9px 0}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;width:0;transition:width .35s}
.prog-txt{font-size:12.5px;color:var(--text2);text-align:center}
/* output */
.output{display:none;margin-top:.875rem}
.output.show{display:block}
.ocard{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:1.125rem;margin-bottom:.875rem}
.ohead{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem}
.ohead h3{font-size:14.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px}
.copy-btn{padding:4px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text2);font-size:11.5px;cursor:pointer;font-weight:500;white-space:nowrap}
.copy-btn:hover{background:var(--surface);border-color:var(--border-strong);color:var(--text)}
.cbox{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.8rem .95rem;font-size:13.5px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:.5rem}
.cbox:last-child{margin-bottom:0}
.cbox strong{color:var(--accent);font-size:12px;display:block;margin-bottom:.35rem;letter-spacing:.03em;text-transform:uppercase}
.tagrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.625rem}
.tag{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.t-hook{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.t-algo{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.t-cta{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border)}
.t-emp{background:#fce7f3;color:#9d174d;border-color:#fbcfe8}
/* metrics */
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.625rem}
@media(max-width:480px){.mets{grid-template-columns:repeat(2,1fr)}}
.met{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem .5rem;text-align:center}
.mv{font-size:17px;font-weight:700;color:var(--text)}
.ml{font-size:10.5px;color:var(--text3);margin-top:2px}
/* tips box */
.tipbox{background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);padding:.8rem .95rem;font-size:13px;color:var(--success);line-height:1.75}
.warnbox{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:.8rem .95rem;font-size:13px;color:var(--warn);line-height:1.75}
/* platform badge */
.pbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;margin-right:5px}
.pbadge-ig{background:var(--ig-bg);color:var(--ig)}
.pbadge-fb{background:var(--fb-bg);color:var(--fb)}
.pbadge-tk{background:var(--tk-bg);color:var(--tk)}
.meta-row{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:.625rem}
/* export */
.exp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:.875rem}
@media(max-width:420px){.exp-row{grid-template-columns:1fr 1fr}}
.expbtn{padding:9px 6px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text2);font-size:12.5px;cursor:pointer;font-weight:500;transition:all .14s;text-align:center}
.expbtn:hover{background:var(--surface2);color:var(--text);border-color:var(--border-strong)}
/* divider */
.odiv{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin:.875rem 0 .5rem;padding-left:2px}
/* toast */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:7px 18px;border-radius:var(--radius);font-size:12.5px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:opacity .18s;white-space:nowrap}
.toast.show{opacity:1}
/* regen bar */
.regen-row{display:flex;gap:7px;margin-top:.875rem}
.regen-btn{flex:1;padding:10px;border:1px solid var(--accent-border);border-radius:var(--radius);background:var(--accent-bg);color:var(--accent);font-size:13px;cursor:pointer;font-weight:600}
.regen-btn:hover{background:var(--accent);color:#fff}
/* section separator */
hr.sep{border:none;border-top:1px solid var(--border);margin:.875rem 0}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header>
  <div class="hd-left">
    <span style="font-size:21px">🎬</span>
    <h1>短影片爆款生成器</h1>
  </div>
  <span class="badge badge-pwa">PWA</span>
</header>

<main>

<!-- 平台 + 目標 -->
<div class="card">
  <div class="stitle">📱 選擇平台</div>
  <div class="ptabs">
    <div class="ptab active" data-p="ig" onclick="selectPlatform('ig')">
      <span class="ico">📸</span>Instagram
    </div>
    <div class="ptab" data-p="fb" onclick="selectPlatform('fb')">
      <span class="ico">👥</span>Facebook
    </div>
    <div class="ptab" data-p="tk" onclick="selectPlatform('tk')">
      <span class="ico">🎵</span>TikTok
    </div>
  </div>

  <!-- 演算法快速說明列 -->
  <div class="algo-bar visible" id="algoBar"></div>

  <div class="stitle">🎯 影片目標</div>
  <div class="goal-grid">
    <div class="gbtn active" data-g="fans" onclick="selectGoal('fans')">
      <span class="gi">👥</span>
      <div><div class="gn">增粉漲粉</div><div class="gd">帳號成長</div></div>
    </div>
    <div class="gbtn" data-g="share" onclick="selectGoal('share')">
      <span class="gi">🔄</span>
      <div><div class="gn">轉發擴散</div><div class="gd">病毒傳播</div></div>
    </div>
    <div class="gbtn" data-g="comment" onclick="selectGoal('comment')">
      <span class="gi">💬</span>
      <div><div class="gn">留言互動</div><div class="gd">提升互動率</div></div>
    </div>
    <div class="gbtn" data-g="traffic" onclick="selectGoal('traffic')">
      <span class="gi">🚀</span>
      <div><div class="gn">導流私域</div><div class="gd">LINE / 社群</div></div>
    </div>
  </div>
</div>

<!-- 內容設定 -->
<div class="card">
  <div class="stitle">✍️ 內容設定</div>

  <div class="fg">
    <label>主題關鍵字<span class="req">*</span></label>
    <input type="text" id="keyword" placeholder="例：居家收納、電商創業、健身減脂、美妝教學、親子料理...">
  </div>

  <div class="fg">
    <label>產品 / 服務 / 品牌</label>
    <input type="text" id="product" placeholder="例：我的整理課程、手工皂品牌、健身教練、親子部落格...">
  </div>

  <div class="fg">
    <label>目標受眾</label>
    <input type="text" id="audience" placeholder="例：25-35歲上班族女性、新手媽媽、想副業創業的年輕人...">
  </div>

  <div class="fg">
    <label>痛點 / 亮點 / 情境描述</label>
    <textarea id="extra" placeholder="例：很多人整理後三天又亂了，我的方法讓客戶半年後還維持整潔。希望讓觀眾感受到「原來我也做得到」的希望感..."></textarea>
  </div>

  <div class="fg">
    <label>內容風格</label>
    <div class="tone-row">
      <div class="tpill active" data-t="教學乾貨型" onclick="selTone(this)">📚 教學乾貨</div>
      <div class="tpill" data-t="故事敘事型" onclick="selTone(this)">📖 故事敘事</div>
      <div class="tpill" data-t="Before/After對比型" onclick="selTone(this)">⚡ 對比反差</div>
      <div class="tpill" data-t="情緒共鳴型" onclick="selTone(this)">💖 情緒共鳴</div>
      <div class="tpill" data-t="挑戰質疑型" onclick="selTone(this)">🔥 挑戰爭議</div>
      <div class="tpill" data-t="懸念揭秘型" onclick="selTone(this)">🔍 懸念揭秘</div>
      <div class="tpill" data-t="幽默娛樂型" onclick="selTone(this)">😂 幽默娛樂</div>
      <div class="tpill" data-t="真人直播感型" onclick="selTone(this)">🎙️ 真實感</div>
    </div>
  </div>
</div>

<!-- API 設定 -->
<div class="card">
  <div class="stitle">🔑 Claude API 設定</div>
  <div class="api-row">
    <div class="fg" style="margin-bottom:0">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
    </div>
    <div class="fg" style="margin-bottom:0">
      <label>模型</label>
      <select id="modelSel">
        <option value="claude-sonnet-4-6">Sonnet 4.6（推薦）</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5（快速）</option>
      </select>
    </div>
  </div>
  <p class="api-note">🔒 API Key 僅在瀏覽器本地使用，不傳送至任何第三方伺服器</p>
</div>

<button class="gen-btn" id="genBtn" onclick="generate()">
  ✨ 一鍵生成爆款腳本
</button>

<div class="prog-area" id="progArea">
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-txt" id="progTxt">分析平台演算法...</div>
</div>

<div class="output" id="output">
  <div id="oTitles" class="ocard"></div>
  <div id="oEmpathy" class="ocard"></div>
  <div id="oScript" class="ocard"></div>
  <div id="oBgm" class="ocard"></div>
  <div id="oHashtags" class="ocard"></div>
  <div id="oTips" class="ocard"></div>
  <div id="oMetrics" class="ocard"></div>

  <div class="regen-row">
    <button class="regen-btn" onclick="generate()">🔄 重新生成</button>
    <button class="regen-btn" onclick="genAll()">🌐 三平台全生成</button>
  </div>

  <div class="exp-row">
    <button class="expbtn" onclick="exportTxt()">📄 匯出 TXT</button>
    <button class="expbtn" onclick="exportMd()">📝 匯出 MD</button>
    <button class="expbtn" onclick="copyAll()">📋 複製全部</button>
  </div>
</div>

</main>

<script>
/* ── 狀態 ── */
let platform='ig', goal='fans', tone='教學乾貨型';
let lastResult='', lastKeyword='', allLastResults=[];

/* ── 演算法知識庫（2024-2025 最新） ── */
const ALGO={
  ig:{
    name:'Instagram',icon:'📸',
    summary:'<strong>IG Reels 演算法重點</strong>儲存率 › 分享率 › 留言 › 完播率 › 按讚。前1秒靜態縮圖衝擊力決定點擊，85%用戶靜音觀看，字幕是必須。70-80%觀眾是非粉絲，每支Reels都是新增粉機會。',
    algo:`
■ 演算法核心指標（優先序）：
  1. 儲存率（Save Rate）— 最強信號，教學/乾貨/清單型最高
  2. 分享率（Share Rate）— 分享到限時動態/私訊給朋友
  3. 完播率（Completion Rate）— 重播次數是加分項
  4. 留言互動（尤其是有意義的長留言）
  5. 按讚（權重最低）

■ 內容格式規範：
  - 最佳時長：7-15秒完播率最高；30-60秒互動深度最佳；勿超過90秒
  - 比例：豎屏 9:16，解析度 1080x1920
  - 前0-1秒：靜止縮圖必須有衝擊力（用戶點擊前看到的就是第一幀）
  - 85%用戶靜音觀看 → 字幕大字覆蓋是必須，字體清晰、位置在螢幕中上區
  - 前3秒內必須出現核心關鍵字（螢幕文字+口播同步）
  - 色彩對比強烈、背景簡潔、主體突出

■ 爆款鉤子類型（IG 最有效）：
  - 「數字型」：「3個讓你...的方法」
  - 「反直覺型」：「你以為...但其實...」
  - 「好奇缺口型」：「沒有人告訴你的...」
  - 「同理痛點型」：「你是不是也...」
  - 「Before畫面型」：直接展示最終結果（吸引追看How）

■ 拉高儲存率的內容模式：
  清單型、步驟教學、資訊圖、可重複參考的資源、讓人想「以後再看」的乾貨

■ 引發分享的觸發點：
  強烈情緒共鳴（「這說出了我的心聲！」）、實用到想存、幽默到想傳給朋友

■ 發文最佳時段：
  週二、週三、週五 上午9-11點；下午3-5點；晚上8-10點（台灣時區）

■ 互動助攻技巧：
  - 說明文字中留「...更多見留言處」引導留言
  - 封面設計要像雜誌封面，讓profile page整體吸引人
  - 發文後前30分鐘積極回覆每一則留言（觸發演算法推播）
    `,
    duration:'30-60秒',hookTime:'前1秒',muteRate:'85%',coverage:'70-80%非粉絲'
  },
  fb:{
    name:'Facebook',icon:'👥',
    summary:'<strong>FB 演算法重點</strong>「有意義的社交互動」是核心。情緒反應權重：😮驚訝 › 😢感動 › 😡憤怒 › 😆哈哈 › 👍讚。留言互動 > 分享到限時/私訊 > 按讚。FB Reels 現在比一般影片有更多免費觸及。',
    algo:`
■ 演算法核心：「有意義的社交互動（MSI）」
  1. 情緒反應（😮😢😡😆比👍權重高3-5倍）
  2. 留言互動（長留言 >> 短留言 >> 貼圖）
  3. 分享（分享到限時/私訊 > 分享到塗鴉牆）

    const kw=document.getElementById('keyword').value.trim();
    if(!kw){alert('請輸入主題關鍵字');resolve(null);return;}
    const apiKey=document.getElementById('apiKey').value.trim();
    if(!apiKey){alert('請輸入 Claude API Key');resolve(null);return;}

    lastKeyword=kw;
    const btn=document.getElementById('genBtn');
    btn.disabled=true;
    const pa=document.getElementById('progArea');
    pa.classList.add('show');
    document.getElementById('output').classList.remove('show');

    const steps=[
      '🔍 分析'+ALGO[p].name+'演算法機制...',
      '🧲 套用三共原則框架...',
      '🪝 設計黃金開場鉤子...',

      '💡 優化觀看時長結構...',

      '#️⃣ 配置三層標籤策略...',
      '📊 計算效益預測指標...'
    ];
    let si=0;
    const fill=document.getElementById('progFill');
    const stEl=document.getElementById('progTxt');
    const timer=setInterval(()=>{
      if(si<steps.length){stEl.textContent=steps[si];fill.style.width=((si+1)/steps.length*82)+'%';si++;}
    },650);

    try{
      const model=document.getElementById('modelSel').value;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          'content-type':'application/json',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model,max_tokens:3000,
          messages:[{role:'user',content:buildPrompt(
            kw,
            document.getElementById('product').value,
            document.getElementById('audience').value,
            document.getElementById('extra').value,
            p,g,tone
          )}]
        })
      });
      const data=await resp.json();
      if(!resp.ok)throw new Error(data.error?.message||'API 錯誤');
      const text=data.content[0].text;
      lastResult=text;
      clearInterval(timer);
      fill.style.width='100%';
      stEl.textContent='✅ 生成完成！';
      setTimeout(()=>{
        pa.classList.remove('show');
        btn.disabled=false;
        renderOutput(text,p,g);
        resolve(text);
      },500);
    }catch(e){
      clearInterval(timer);
      pa.classList.remove('show');
      btn.disabled=false;
      alert('生成失敗：'+e.message);
      resolve(null);
    }
  });
}

/* ── 解析區段 ── */
function extractSection(text,tag){
  const re=new RegExp(`---${tag}---([\\s\\S]*?)(?=---[A-Z]+---|$)`,'i');
  const m=text.match(re);
  return m?m[1].trim():'';
}

/* ── 渲染輸出 ── */
function platformBadge(p){
  const a=ALGO[p];
  return `<span class="pbadge pbadge-${p}">${a.icon} ${a.name}</span>`;
}

function renderOutput(text,p,g){
  const sec=tag=>extractSection(text,tag);
  const titles=sec('TITLES'),empathy=sec('EMPATHY'),hook=sec('HOOK');
  const script=sec('SCRIPT'),bgm=sec('BGM'),hashtags=sec('HASHTAGS');
  const tips=sec('ALGOTIPS'),metrics=sec('METRICS');

  const el=id=>document.getElementById(id);
  const pb=platformBadge(p);
  const goalBadge=`<span class="badge" style="background:var(--accent-bg);color:var(--accent);border-color:var(--accent-border);font-size:10.5px">${GOAL_NAMES[g]}</span>`;
  const toneBadge=`<span class="badge" style="background:var(--success-bg);color:var(--success);border-color:var(--success-border);font-size:10.5px">${tone}</span>`;

  /* 標題 */
  el('oTitles').innerHTML=`
    <div class="ohead">
      <h3>✨ 爆款標題方案</h3>
      <button class="copy-btn" onclick="cpTxt(${JSON.stringify(titles)})">📋 複製標題</button>
    </div>
    <div class="meta-row">${pb}${goalBadge}${toneBadge}</div>
    <div class="cbox">${esc(titles)}</div>`;

  /* 共情分析 */
  el('oEmpathy').innerHTML=`
    <div class="ohead">
      <h3>💖 三共分析（共情 / 共鳴 / 共感）</h3>
    </div>
    <div class="tagrow">
      <span class="tag t-emp">💖 共情設計</span>
      <span class="tag t-hook">🔥 共鳴設計</span>
      <span class="tag t-algo">✨ 共感設計</span>
    </div>
    <div class="cbox">${esc(empathy)}</div>`;

  /* 腳本 */
  el('oScript').innerHTML=`
    <div class="ohead">
      <h3>🎬 完整腳本（時間軸分段）</h3>
      <button class="copy-btn" onclick="cpTxt(${JSON.stringify(hook+'\n\n'+script)})">📋 複製腳本</button>
    </div>
    <div class="tagrow">
      <span class="tag t-hook">🪝 黃金鉤子</span>
      <span class="tag t-algo">📈 演算法優化</span>
      <span class="tag t-emp">💖 三共原則</span>
      <span class="tag t-cta">📣 ${GOAL_NAMES[g]} CTA</span>
    </div>
    <div class="cbox"><strong>▶ 黃金開場鉤子</strong>${esc(hook)}</div>
    <div class="cbox"><strong>▶ 完整時間軸腳本</strong>${esc(script)}</div>`;

  /* BGM */
  el('oBgm').innerHTML=`
    <div class="ohead">
      <h3>🎵 音樂 / BGM 建議</h3>
    </div>
    <div class="warnbox">${esc(bgm)}</div>`;

  /* 標籤 */
  el('oHashtags').innerHTML=`
    <div class="ohead">
      <h3>#️⃣ 三層標籤策略</h3>
      <button class="copy-btn" onclick="cpTxt(${JSON.stringify(hashtags)})">📋 複製標籤</button>
    </div>
    <div class="cbox">${esc(hashtags)}</div>`;

  /* 演算法 tips */
  el('oTips').innerHTML=`
    <div class="ohead">
      <h3>⚙️ 演算法優化 + 發布行動清單</h3>
    </div>
    <div class="tipbox">${esc(tips)}</div>`;

  /* 指標 */
  function getMt(label){
    const m=metrics.match(new RegExp(label+'[：:]\\s*([^\\n]+)'));
    return m?m[1].trim():'-';
  }
  el('oMetrics').innerHTML=`
    <div class="ohead"><h3>📊 預期效益指標</h3></div>
    <div class="mets">
      <div class="met"><div class="mv">${getMt('預估完播率')}</div><div class="ml">完播率</div></div>
      <div class="met"><div class="mv">${getMt('互動率目標')}</div><div class="ml">互動率</div></div>
      <div class="met"><div class="mv">${getMt('最佳影片長度')}</div><div class="ml">建議長度</div></div>
      <div class="met"><div class="mv">${getMt('建議發文頻率')}</div><div class="ml">發文頻率</div></div>
    </div>
    <div class="cbox" style="font-size:12.5px">${esc(metrics)}</div>`;

  el('output').classList.add('show');
  el('oTitles').scrollIntoView({behavior:'smooth',block:'start'});
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function cpTxt(t){
  navigator.clipboard.writeText(t).then(()=>showToast('已複製 ✓'));
}
function copyAll(){
  navigator.clipboard.writeText(lastResult).then(()=>showToast('已複製全部內容 ✓'));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function exportTxt(){
  if(!lastResult){alert('請先生成腳本');return;}
  const blob=new Blob([lastResult],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`腳本_${lastKeyword}_${ALGO[platform].name}_${Date.now()}.txt`;
  a.click();
}

function exportMd(){
  if(!lastResult){alert('請先生成腳本');return;}
  const md=`# 短影片爆款腳本

| 項目 | 內容 |
|------|------|
| **平台** | ${ALGO[platform].name} |
| **目標** | ${GOAL_NAMES[goal]} |
| **風格** | ${tone} |
| **主題** | ${lastKeyword} |
| **生成時間** | ${new Date().toLocaleString('zh-TW')} |

---

${lastResult}`;
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`腳本_${lastKeyword}_${Date.now()}.md`;
  a.click();
}

async function genAll(){
  const kw=document.getElementById('keyword').value.trim();
  if(!kw){alert('請先輸入主題關鍵字');return;}
  const apiKey=document.getElementById('apiKey').value.trim();
  if(!apiKey){alert('請輸入 Claude API Key');return;}
  if(!confirm('將依序生成 Instagram + Facebook + TikTok 三平台腳本（需3-5分鐘），確認繼續？'))return;

  const platforms=['ig','fb','tk'];
  allLastResults=[];
  for(const p of platforms){
    showToast(`正在生成 ${ALGO[p].name} 腳本...`);
    const result=await generate(p,goal);
    if(result){
      allLastResults.push({platform:p,result});
    }
  }

  if(allLastResults.length>0){
    const content=[
      `短影片爆款腳本 — 三平台完整版`,
      `主題：${kw}  目標：${GOAL_NAMES[goal]}  風格：${tone}`,
      `生成時間：${new Date().toLocaleString('zh-TW')}`,
      '',
      ...allLastResults.map(({platform:p,result})=>[
        '='.repeat(60),
        `平台：${ALGO[p].name}`,
        '='.repeat(60),
        result,
        ''
      ].join('\n'))
    ].join('\n');

    const blob=new Blob([content],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`三平台腳本_${kw}_${Date.now()}.txt`;
    a.click();
    showToast('三平台腳本已下載！');
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
